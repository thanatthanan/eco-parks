            right: 10px;
            z-index: 1000;

            padding: 15px;

            height: 18px;

            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .home-btn:hover {
            background: #2d5a27;

            box-shadow: 0 6px 15px rgba(45, 90, 39, 0.3);
            border-color: #2d5a27;
        }
        .home-btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }
        .home-btn:hover svg {

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Load GeoJSON for Thailand Provinces
    fetch('https://raw.githubusercontent.com/apisit/thailand.json/master/thailand.json')
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, {
                style: function(feature) {
                    const provName = feature.properties.name;
                    const isVisited = visitedProvinces.includes(provName);
                    return {
                        fillColor: isVisited ? '#2ecc71' : '#ecf0f1',
                        weight: 1,
                        opacity: 1,
                        color: '#bdc3c7',
                        fillOpacity: 0.7
                    };
                },
                onEachFeature: function(feature, layer) {
                    layer.on({
                        mouseover: function(e) {
                            const layer = e.target;
                            layer.setStyle({
                                weight: 3,
                                color: '#34495e',
                                fillOpacity: 0.9
                            });
                            document.getElementById('details').innerHTML = `<b>จังหวัด:</b> ${feature.properties.name}`;
                        },
                        mouseout: function(e) {
                            const layer = e.target;
                            const isVisited = visitedProvinces.includes(feature.properties.name);
                            layer.setStyle({
                                weight: 1,
                                color: '#bdc3c7',
                                fillOpacity: 0.7
                            });
                            document.getElementById('details').innerHTML = 'ชี้ที่จังหวัดเพื่อดูรายละเอียด';
                        }
                    });
                }
            }).addTo(map);
        });

            .addTo(map)
            .bindPopup(`<b>อุทยานแห่งชาติ${park.name}</b><br>จ. ${park.prov}`);
    });

        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    // Add Markers for Unvisited National Parks
    unvisitedParks.forEach(park => {
        L.marker([park.lat, park.lng], {icon: greyIcon})
            .addTo(map)
            .bindPopup(`<b>อุทยานแห่งชาติ${park.name}</b><br>จ. ${park.prov}<br><span style="color:#7f8c8d;">(ยังไม่เคยไป)</span>`);
